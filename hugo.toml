baseURL = '/'
languageCode = 'zh-cn'
hasCJKLanguage = true
defaultContentLanguage = 'zh'
title = '香草山'
theme = 'my-book'

[[menu.before]]
  name = "📖 书架"
  pageRef = "/books"
  weight = 1

[[menu.before]]
  name = "🎼 音乐"
  pageRef = "/music"
  weight = 2

[[menu.before]]
  name = "🧒 儿童"
  pageRef = "/children"
  weight = 3

[params]
  BookTheme = 'light'
  BookSearch = false
  # Service worker modes:
  # - "runtime": enable SW but only runtime-cache fetched same-origin pages
  # - "precache": additionally precache all pages at install time
  BookServiceWorker = "runtime"
  
  [params.features]
    autoRedirectSections = true
    audioPlayAll = true
    strictShortcodes = false

  [params.integration.audio]
    functionBase = "/.netlify/functions/audio"
    queryBookKey = "book"
    querySrcKey = "src"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 1
  