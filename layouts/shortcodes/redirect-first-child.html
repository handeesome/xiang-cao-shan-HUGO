{{- $.Scratch.Delete "firstPage" -}}

{{- partial "find-first-content.html" (dict "ctx" . "page" .Page) -}}

{{- $first := $.Scratch.Get "firstPage" -}}
{{- if $first }}
  <meta http-equiv="refresh" content="0; url={{ $first.RelPermalink }}">
  <link rel="canonical" href="{{ $first.Permalink }}">
  <noscript>
    <a href="{{ $first.RelPermalink }}">Continue</a>
  </noscript>
{{- else }}
  <p>❌ No content page found for redirection.</p>
{{- end }}
